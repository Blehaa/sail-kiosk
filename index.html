<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
  html, body { margin: 0; height: 100%; background: #0D1F4E; font-family: -apple-system, Arial, sans-serif; color: #fff; }
  #wrap { display: flex; flex-direction: column; align-items: center; min-height: 100%; padding: 16px; box-sizing: border-box; }
  h1 { font-size: 20px; font-weight: 500; margin: 8px 0 12px; }
  #reader { width: 100%; max-width: 360px; border-radius: 14px; overflow: hidden; background: #000; }
  #status { margin-top: 16px; font-size: 22px; min-height: 30px; text-align: center; }
  #detail { margin-top: 6px; font-size: 14px; color: #9fb4e6; word-break: break-all; text-align: center; }
  .ok { color: #7AC143; }
  .err { color: #ff9a9a; }
</style>
</head>
<body>
<div id="wrap">
  <h1>SAIL Check-In — Camera Test</h1>
  <div id="reader"></div>
  <div id="status">Starting camera…</div>
  <div id="detail"></div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  var statusEl = document.getElementById('status');
  var detailEl = document.getElementById('detail');
  var lastCode = '', lastTime = 0, busy = false;
  var scanner = new Html5Qrcode("reader");

  function beep() {
    try {
      var ac = new (window.AudioContext || window.webkitAudioContext)();
      var o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = 880;
      g.gain.setValueAtTime(0.001, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.4, ac.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
      o.start(); o.stop(ac.currentTime + 0.26);
    } catch (e) {}
  }

  function onScan(text) {
    var now = Date.now();
    if (busy) return;
    if (text === lastCode && now - lastTime < 4000) return;
    lastCode = text; lastTime = now; busy = true;
    beep();
    statusEl.textContent = '\u2713 Captured';
    statusEl.className = 'ok';
    detailEl.textContent = text;
    setTimeout(function() {
      busy = false;
      statusEl.textContent = 'Point a QR code at the camera';
      statusEl.className = '';
      detailEl.textContent = '';
    }, 2000);
  }

  var config = { fps: 10, qrbox: 240, experimentalFeatures: { useBarCodeDetectorIfSupported: true } };

  scanner.start({ facingMode: "user" }, config, onScan)
    .then(function() {
      statusEl.textContent = 'Point a QR code at the camera';
      statusEl.className = '';
    })
    .catch(function(err) {
      statusEl.textContent = 'Camera blocked';
      statusEl.className = 'err';
      detailEl.textContent = String(err);
    });
</script>
</body>
</html>
