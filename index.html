<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
  html, body { margin: 0; height: 100%; background: #0D1F4E; font-family: -apple-system, Arial, sans-serif; color: #fff; -webkit-user-select: none; user-select: none; }
  #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; padding: 10px; box-sizing: border-box; position: relative; }
  h1 { font-size: 18px; font-weight: 500; margin: 0 0 8px; }
  #reader { width: 92vw; max-width: 640px; border-radius: 16px; overflow: hidden; background: #000; }
  #name { margin-top: 12px; font-size: 30px; min-height: 36px; text-align: center; font-weight: 500; line-height: 1.1; }
  .ok  { color: #7AC143; }
  .err { color: #ff8a8a; }
  #banner {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: none; align-items: center; justify-content: center;
    padding: 14px 0;
    font-size: 84px; font-weight: 700; line-height: 1;
    text-transform: uppercase; letter-spacing: 2px;
    color: #0D1F4E;
  }
  .b-present { background: #7AC143; }
  .b-late    { background: #f0a500; }
  .b-error   { background: #ff8a8a; }
</style>
</head>
<body>
<div id="wrap">
  <h1>SAIL Check-In</h1>
  <div id="reader"></div>
  <div id="name">Starting camera…</div>
</div>
<div id="banner"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  var RECEIVER_URL = 'https://script.google.com/macros/s/AKfycbxVoA0SrYCSI4Fb5f8tq4qpRqxDJOAQge0Tp-RcgaOa-hDejhhc5nLhr3e5GHuQ5t7qcA/exec';
  var params = new URLSearchParams(location.search);
  var KEY    = params.get('key')   || '';
  var KIOSK  = params.get('kiosk') || 'Unknown';

  var nameEl   = document.getElementById('name');
  var bannerEl = document.getElementById('banner');
  var lastCode = '', lastTime = 0, busy = false;
  var scanner = new Html5Qrcode("reader");

  function beep(good) {
    try {
      var ac = new (window.AudioContext || window.webkitAudioContext)();
      var o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = good ? 880 : 300;
      g.gain.setValueAtTime(0.001, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.4, ac.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.28);
      o.start(); o.stop(ac.currentTime + 0.3);
    } catch (e) {}
  }

  function banner(text, cls) {
    bannerEl.textContent = text;
    bannerEl.className = cls;
    bannerEl.style.display = 'flex';
  }

  function reset(delay) {
    setTimeout(function() {
      busy = false;
      nameEl.textContent = 'Point your card at the camera';
      nameEl.className = '';
      bannerEl.style.display = 'none';
    }, delay || 2400);
  }

  function show(res) {
    if (res.ok) {
      beep(true);
      nameEl.textContent = '\u2713 ' + res.name;
      nameEl.className = 'ok';
      var late = (String(res.status).toLowerCase() === 'late');
      banner(res.status, late ? 'b-late' : 'b-present');
      reset(2400);
    } else if (res.reason === 'noschool') {
      nameEl.textContent = 'No school today';
      nameEl.className = '';
      reset(2200);
    } else if (res.reason === 'rejected') {
      beep(false);
      nameEl.textContent = 'See the front desk';
      nameEl.className = 'err';
      banner('Not allowed', 'b-error');
      reset(2800);
    } else if (res.reason === 'unknown') {
      beep(false);
      nameEl.textContent = '';
      nameEl.className = 'err';
      banner('Not recognized', 'b-error');
      reset(2800);
    } else {
      beep(false);
      nameEl.textContent = res.message || '';
      nameEl.className = 'err';
      banner('Try again', 'b-error');
      reset(2800);
    }
  }

  function sendScan(code) {
    var cbName = 'k_' + Date.now();
    var s = document.createElement('script');
    window[cbName] = function(res) { show(res); cleanup(s, cbName); };
    s.onerror = function() { show({ ok:false, reason:'neterr', message:'Network error' }); cleanup(s, cbName); };
    s.src = RECEIVER_URL + '?callback=' + cbName +
            '&key='   + encodeURIComponent(KEY) +
            '&kiosk=' + encodeURIComponent(KIOSK) +
            '&code='  + encodeURIComponent(code);
    document.body.appendChild(s);
  }

  function cleanup(s, cbName) {
    try { document.body.removeChild(s); } catch (e) {}
    try { delete window[cbName]; } catch (e) {}
  }

  function onScan(text) {
    var now = Date.now();
    if (busy) return;
    if (text === lastCode && now - lastTime < 4000) return;
    lastCode = text; lastTime = now; busy = true;
    nameEl.textContent = 'Checking…';
    nameEl.className = '';
    sendScan(text);
  }

  var qrboxFn = function(vw, vh) {
    var m = Math.floor(Math.min(vw, vh) * 0.75);
    return { width: m, height: m };
  };
  var config = { fps: 10, qrbox: qrboxFn, experimentalFeatures: { useBarCodeDetectorIfSupported: true } };

  scanner.start({ facingMode: "user" }, config, onScan)
    .then(function() {
      nameEl.textContent = 'Point your card at the camera';
      nameEl.className = '';
    })
    .catch(function(err) {
      nameEl.textContent = 'Camera blocked';
      nameEl.className = 'err';
    });

  var wl = null;
  async function keepAwake() { try { wl = await navigator.wakeLock.request('screen'); } catch (e) {} }
  if ('wakeLock' in navigator) {
    keepAwake();
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') keepAwake();
    });
  }
</script>
</body>
</html>
